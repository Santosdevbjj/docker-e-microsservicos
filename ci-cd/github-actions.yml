name: CI/CD Pipeline - FAANG Microservices

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build e Teste - Users Service
        run: |
          cd users-service
          mvn clean verify

      - name: Build e Teste - Products Service
        run: |
          cd products-service
          mvn clean verify

      - name: Build e Teste - Payments Service
        run: |
          cd payments-service
          mvn clean verify

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login no DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push Users Service
        run: |
          cd users-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/users-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/users-service:latest

      - name: Build e Push Products Service
        run: |
          cd products-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/products-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/products-service:latest

      - name: Build e Push Payments Service
        run: |
          cd payments-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/payments-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/payments-service:latest

  deploy-k8s:
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configurar acesso ao cluster
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml

      - name: Deploy Users Service
        run: kubectl apply -f k8s/users-deployment.yaml

      - name: Deploy Products Service
        run: kubectl apply -f k8s/products-deployment.yaml

      - name: Deploy Payments Service
        run: kubectl apply -f k8s/payments-deployment.yaml

      - name: Deploy Gateway
        run: kubectl apply -f k8s/gateway-deployment.yaml

      - name: Deploy PostgreSQL
        run: kubectl apply -f k8s/postgres-deployment.yaml

      - name: Deploy Observabilidade
        run: |
          kubectl apply -f k8s/prometheus-configmap.yaml
          kubectl apply -f k8s/prometheus-deployment.yaml
          kubectl apply -f k8s/grafana-configmap.yaml
          kubectl apply -f k8s/grafana-deployment.yaml
