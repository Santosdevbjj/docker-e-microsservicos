version: "3.9"
services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: senha123
      POSTGRES_DB: faangdb
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  users-service:
    build: ./users-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres

  products-service:
    build: ./products-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres

  payments-service:
    build: ./payments-service
    ports:
      - "8083:8083"
    depends_on:
      - postgres

  gateway:
    build: ./gateway
    ports:
      - "4500:4500"
    depends_on:
      - users-service
      - products-service
      - payments-service
