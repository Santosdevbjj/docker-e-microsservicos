apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'users-service'
        static_configs:
          - targets: ['users-service:8081']

      - job_name: 'products-service'
        static_configs:
          - targets: ['products-service:8082']

      - job_name: 'payments-service'
        static_configs:
          - targets: ['payments-service:8083']

      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres:5432']
